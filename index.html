<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bilingual Reader — 雙語朗讀・沉浸式英語學習</title>
  <meta property="og:title" content="Bilingual Reader — 雙語朗讀・沉浸式英語學習">
  <meta property="og:description" content="經典文學・哲學・奇幻小說，英中雙語朗讀，邊聽邊學英語。">
  <meta property="og:image" content="https://ijioxc.github.io/ijireader/og-cover.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://ijioxc.github.io/ijireader/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://ijioxc.github.io/ijireader/og-cover.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Noto+Serif+TC:wght@200;300;400&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet">
  <link rel="manifest" href="app.webmanifest">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered!', reg))
        .catch(err => console.log('SW failed!', err));
    }
  </script>
  <style>
    :root {
      --fs-base: 16px;
      --bg: #0f0f12;
      --bg2: #131317;
      --sur: #1a1a20;
      --card: #212128;
      --b1: #2a2a33;
      --b2: #363642;
      --gold: #c8a96e;
      --goldd: rgba(200, 169, 110, .12);
      --goldg: rgba(200, 169, 110, .35);
      --ice: #8bbfcf;
      --iced: rgba(139, 191, 207, .12);
      --t1: #ede6dc;
      --t2: #8a8490;
      --t3: #4a4a56;
      --green: #4e9470;
      --red: #b05555;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      font-size: var(--fs-base);
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--t1);
      font-family: 'Cormorant Garamond', 'Noto Serif TC', serif
    }

    /* top bar */
    #top {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      border-bottom: 1px solid var(--b1);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 10
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      font-style: italic;
      color: var(--gold);
      letter-spacing: .04em
    }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--t3);
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-top: 2px
    }

    .top-right {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--t3)
    }

    /* hero */
    #hero {
      padding: 48px 24px 32px;
      max-width: 900px;
      margin: 0 auto;
      text-align: center
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-style: italic;
      font-weight: 300;
      color: var(--t1);
      line-height: 1.2;
      margin-bottom: 10px
    }

    #hero p {
      font-family: 'Noto Serif TC', serif;
      font-size: 13px;
      font-weight: 200;
      color: var(--t2);
      letter-spacing: .08em
    }

    /* divider */
    .divider {
      max-width: 900px;
      margin: 0 auto 32px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--b1)
    }

    .divider-text {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: .2em;
      color: var(--t3);
      text-transform: uppercase
    }

    /* books grid */
    #books {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 64px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px
    }

    /* book card */
    .book-card {
      background: var(--card);
      border: 1px solid var(--b1);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all .3s cubic-bezier(.2, .8, .2, 1);
      position: relative;
      overflow: hidden
    }

    .book-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--ice));
      opacity: 0;
      transition: opacity .3s
    }

    .book-card:hover {
      border-color: var(--goldg);
      transform: translateY(-3px);
      box-shadow: 0 20px 48px rgba(0, 0, 0, .5)
    }

    .book-card:hover::before {
      opacity: 1
    }

    .book-meta {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: .18em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 10px
    }

    .book-title {
      font-size: 20px;
      font-style: italic;
      font-weight: 600;
      color: var(--t1);
      margin-bottom: 6px;
      line-height: 1.3
    }

    .book-desc {
      font-family: 'Noto Serif TC', serif;
      font-size: 12px;
      font-weight: 200;
      color: var(--t2);
      line-height: 1.8;
      letter-spacing: .04em;
      margin-bottom: 18px
    }

    .book-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 18px
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      font-weight: 400
    }

    .stat-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      color: var(--t3);
      letter-spacing: .15em;
      text-transform: uppercase
    }

    .book-progress {
      margin-bottom: 18px
    }

    .progress-bar {
      height: 2px;
      background: var(--b1);
      border-radius: 2px;
      margin-bottom: 5px
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), #d4b97e);
      transition: width .5s
    }

    .progress-text {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--t3)
    }

    .read-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(200, 169, 110, .3);
      background: var(--goldd);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: .1em;
      cursor: pointer;
      transition: .2s;
      text-align: center
    }

    .read-btn:hover {
      background: rgba(200, 169, 110, .2);
      border-color: var(--gold)
    }

    /* loading state */
    .loading-card {
      background: var(--card);
      border: 1px solid var(--b1);
      border-radius: 16px;
      padding: 24px;
      animation: pulse 1.5s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .5
      }

      50% {
        opacity: .8
      }
    }

    .loading-line {
      height: 10px;
      background: var(--b1);
      border-radius: 4px;
      margin-bottom: 10px
    }

    .loading-line.short {
      width: 40%
    }

    .loading-line.medium {
      width: 70%
    }

    /* filter bar */
    #filter-bar {
      max-width: 900px;
      margin: 0 auto 24px;
      padding: 0 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--t2);
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all .2s
    }

    .filter-btn:hover {
      border-color: var(--b2);
      color: var(--t1)
    }

    .filter-btn.active {
      border-color: var(--gold);
      background: var(--goldd);
      color: var(--gold)
    }

    /* dimmed card (coming soon) */
    .book-card.dimmed {
      opacity: .42;
      pointer-events: none;
      cursor: default
    }

    .coming-soon-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--t3);
      border: 1px solid var(--b1);
      border-radius: 4px;
      padding: 3px 7px
    }

    /* empty state */
    #empty {
      display: none;
      text-align: center;
      padding: 80px 24px;
      color: var(--t3);
      font-family: 'DM Mono', monospace;
      font-size: 11px
    }

    #portal-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(15, 15, 18, 0.3) 0%, var(--bg) 80%);
      /* 傳送門中間半透明 */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #portal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .portal-circle {
      width: 140px;
      height: 140px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      position: relative;
      transform: scale(0.2);
      opacity: 0;
      transition: transform 1s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 0.5s ease;
      box-shadow: 0 0 60px var(--gold), inset 0 0 30px var(--gold);
    }

    #portal-overlay.active .portal-circle {
      opacity: 1;
      animation: portal-bloom 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes portal-bloom {
      0% {
        transform: scale(0.2) rotate(0deg);
        opacity: 0;
      }

      40% {
        transform: scale(15) rotate(180deg);
        opacity: 1;
      }

      /* 開啟 */
      100% {
        transform: scale(1) rotate(540deg);
        opacity: 0.8;
      }

      /* 收斂 */
    }

    .portal-text {
      position: absolute;
      top: 50%;
      left: 50%;
      font-family: 'DM Mono', 'Noto Sans TC', sans-serif;
      font-size: 8px;
      font-weight: 500;
      color: var(--gold);
      white-space: nowrap;
      transform-origin: 0 50%;
      opacity: 0.8;
      text-shadow: 0 0 5px var(--gold);
    }

    @keyframes portal-spin {
      0% {
        transform: scale(15) rotate(0deg);
      }

      100% {
        transform: scale(15) rotate(360deg);
      }
    }

    /* 卡片點擊微動態 */
    .book-card:active {
      transform: scale(0.96) !important;
      transition: transform 0.1s;
    }

    /* ── Drawer ────────────────────────────────── */
    #drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s
    }
    #drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto
    }

    #drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(480px, 100vw);
      height: 100vh;
      background: var(--bg2);
      border-left: 1px solid var(--b1);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.2,.8,.2,1);
      overflow: hidden
    }
    #drawer.open {
      transform: translateX(0)
    }

    #drawer-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--b1);
      display: flex;
      align-items: flex-start;
      gap: 12px
    }
    #drawer-close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--t3);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      transition: color .2s;
      flex-shrink: 0
    }
    #drawer-close:hover { color: var(--t1) }

    #drawer-meta {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: .18em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 6px
    }
    #drawer-title {
      font-size: 22px;
      font-style: italic;
      font-weight: 600;
      color: var(--t1);
      line-height: 1.25;
      margin-bottom: 4px
    }
    #drawer-author {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--t2)
    }

    #drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px
    }
    #drawer-body::-webkit-scrollbar { width: 4px }
    #drawer-body::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px }

    .drawer-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: .2em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 8px
    }

    #drawer-desc {
      font-family: 'Noto Serif TC', serif;
      font-size: 16px;
      font-weight: 200;
      color: var(--t2);
      line-height: 2;
      letter-spacing: .04em
    }

    #drawer-stats {
      display: flex;
      gap: 24px
    }

    .progress-bar-lg {
      height: 3px;
      background: var(--b1);
      border-radius: 2px;
      margin-top: 10px
    }
    .progress-fill-lg {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), #d4b97e);
      transition: width .5s
    }
    .progress-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--t3);
      margin-top: 5px
    }

    #drawer-chapters {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 340px;
      overflow-y: auto;
      border: 1px solid var(--b1);
      border-radius: 10px;
      padding: 6px
    }
    #drawer-chapters::-webkit-scrollbar { width: 4px }
    #drawer-chapters::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px }

    .ch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s
    }
    .ch-row:hover { background: var(--sur) }
    .ch-row.current { background: var(--goldd) }

    .ch-num {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--t3);
      width: 32px;
      flex-shrink: 0
    }
    .ch-title {
      font-size: 13px;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1
    }
    .ch-row.current .ch-title { color: var(--gold) }
    .ch-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0
    }

    #drawer-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--b1);
      display: flex;
      gap: 10px
    }
    #drawer-read-btn {
      flex: 1;
      padding: 12px;
      background: var(--goldd);
      border: 1px solid rgba(200,169,110,.4);
      border-radius: 10px;
      color: var(--gold);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      cursor: pointer;
      transition: .2s;
      text-align: center
    }
    #drawer-read-btn:hover {
      background: rgba(200,169,110,.2);
      border-color: var(--gold)
    }
    #drawer-start-btn {
      padding: 12px 16px;
      background: transparent;
      border: 1px solid var(--b2);
      border-radius: 10px;
      color: var(--t2);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      cursor: pointer;
      transition: .2s;
      white-space: nowrap
    }
    #drawer-start-btn:hover {
      border-color: var(--t2);
      color: var(--t1)
    }
  </style>
</head>

<body>
  <div id="top">
    <div>
      <div class="logo">Bilingual Reader</div>
      <div class="logo-sub">雙語聆聽學習</div>
    </div>
    <div class="top-right" id="lib-count">Loading...</div>
  </div>

  <div id="hero">
    <h1>Your Reading Library</h1>
    <p>雙語朗讀・字幕翻譯・沉浸式英語學習</p>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">Books</div>
    <div class="divider-line"></div>
  </div>

  <div id="filter-bar"></div>

  <div id="books">
    <!-- Loading skeletons -->
    <div class="loading-card" id="sk1">
      <div class="loading-line short"></div>
      <div class="loading-line medium"></div>
      <div class="loading-line"></div>
    </div>
    <div class="loading-card" id="sk2">
      <div class="loading-line short"></div>
      <div class="loading-line medium"></div>
      <div class="loading-line"></div>
    </div>
  </div>

  <div id="empty">No books found. Check your books/ folder.</div>

  <!-- Right Drawer -->
  <div id="drawer-backdrop"></div>
  <div id="drawer">
    <div id="drawer-header">
      <div>
        <div id="drawer-meta"></div>
        <div id="drawer-title"></div>
        <div id="drawer-author"></div>
      </div>
      <button id="drawer-close">✕</button>
    </div>
    <div id="drawer-body">
      <div id="drawer-desc-wrap">
        <div class="drawer-section-label">About</div>
        <div id="drawer-desc"></div>
      </div>
      <div id="drawer-progress-wrap">
        <div class="drawer-section-label">Progress</div>
        <div id="drawer-stats"></div>
        <div class="progress-bar-lg"><div class="progress-fill-lg" id="drawer-pfill"></div></div>
        <div class="progress-label" id="drawer-plabel"></div>
      </div>
      <div id="drawer-chapters-wrap">
        <div class="drawer-section-label">Chapters</div>
        <div id="drawer-chapters"></div>
      </div>
    </div>
    <div id="drawer-footer">
      <button id="drawer-read-btn">▶ Continue Reading</button>
      <button id="drawer-start-btn">From Ch. 1</button>
    </div>
  </div>

  <script>
    let allCards = [];
    let activeFilter = 'All';
    const bookDataMap = {};   // bookId → { book, manifest, chapterCount, savedCh, pct }

    // ── Filter ────────────────────────────────────
    function applyFilter(type) {
      activeFilter = type;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
      });
      allCards.forEach(({ card, bookType }) => {
        card.style.display = (type === 'All' || bookType === type) ? '' : 'none';
      });
    }

    function buildFilterBar(types) {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = ['All', ...types].map(t =>
        `<button class="filter-btn${t === 'All' ? ' active' : ''}" data-type="${t}">${t}</button>`
      ).join('');
      bar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => applyFilter(btn.dataset.type));
      });
    }

    // ── Portal ────────────────────────────────────
    function openPortal(bookId, ch) {
      closeDrawer();
      let portal = document.getElementById('portal-overlay');
      if (!portal) {
        portal = document.createElement('div');
        portal.id = 'portal-overlay';
        portal.innerHTML = `<div class="portal-circle">${
          Array.from({ length: 8 }, (_, i) =>
            `<div class="portal-text" style="transform:rotate(${i*45}deg) translateX(70px)">${
              i % 2 === 0 ? 'SYSTEM LOADING' : '進入世界'}</div>`
          ).join('')
        }</div>`;
        document.body.appendChild(portal);
      }
      setTimeout(() => portal.classList.add('active'), 10);
      setTimeout(() => {
        window.location.href = `reader.html?book=${bookId}&ch=${ch}`;
      }, 1000);
    }

    // ── Drawer ────────────────────────────────────
    const drawer     = document.getElementById('drawer');
    const backdrop   = document.getElementById('drawer-backdrop');

    function openDrawer(bookId) {
      const d = bookDataMap[bookId];
      if (!d) return;
      const { book, manifest, chapterCount, savedCh, pct } = d;

      // header
      document.getElementById('drawer-meta').textContent =
        `${book.type} · ${book.source}`;
      document.getElementById('drawer-title').textContent = book.title;
      document.getElementById('drawer-author').textContent = book.author;

      // desc
      const descEl = document.getElementById('drawer-desc');
      const descText = book.desc || '（暫無描述）';
      descEl.innerHTML = descText.replace(/。/g, '。<br><br>').replace(/<br><br>$/, '');

      // progress stats
      document.getElementById('drawer-stats').innerHTML = `
        <div class="stat">
          <div class="stat-val">${chapterCount}</div>
          <div class="stat-lbl">Chapters</div>
        </div>
        <div class="stat">
          <div class="stat-val">${savedCh}</div>
          <div class="stat-lbl">Last Read</div>
        </div>
        <div class="stat">
          <div class="stat-val">${pct}%</div>
          <div class="stat-lbl">Progress</div>
        </div>
      `;
      document.getElementById('drawer-pfill').style.width = pct + '%';
      document.getElementById('drawer-plabel').textContent =
        `Chapter ${savedCh} / ${chapterCount}`;

      // chapter list
      const chList = document.getElementById('drawer-chapters');
      chList.innerHTML = manifest.chapters.map(ch => `
        <div class="ch-row${ch.id === savedCh ? ' current' : ''}" data-ch="${ch.id}">
          ${ch.id === savedCh ? '<div class="ch-dot"></div>' : ''}
          <span class="ch-num">${String(ch.id).padStart(4, '0')}</span>
          <span class="ch-title">${ch.title}</span>
        </div>
      `).join('');
      chList.querySelectorAll('.ch-row').forEach(row => {
        row.addEventListener('click', () => openPortal(bookId, parseInt(row.dataset.ch)));
      });

      // scroll to current chapter
      const currentRow = chList.querySelector('.current');
      if (currentRow) setTimeout(() => currentRow.scrollIntoView({ block: 'center' }), 50);

      // footer buttons
      document.getElementById('drawer-read-btn').onclick =
        () => openPortal(bookId, savedCh);
      document.getElementById('drawer-start-btn').onclick =
        () => openPortal(bookId, 1);

      drawer.classList.add('open');
      backdrop.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
      document.body.style.overflow = '';
    }

    backdrop.addEventListener('click', closeDrawer);
    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    // ── Library ───────────────────────────────────
    async function loadLibrary() {
      const container = document.getElementById('books');
      const books = await fetch('books/books.json').then(r => r.json());

      const manifestMap = {};
      await Promise.all(
        books.filter(b => b.id).map(async b => {
          try {
            manifestMap[b.id] = await fetch(`books/${b.id}/manifest.json`).then(r => r.json());
          } catch {}
        })
      );

      const typeSet = [];
      books.forEach(b => { if (!typeSet.includes(b.type)) typeSet.push(b.type); });
      buildFilterBar(typeSet);

      container.innerHTML = '';
      let readyCount = 0;

      for (const book of books) {
        const manifest = book.id ? manifestMap[book.id] : null;
        const isReady  = !!manifest;
        if (isReady) readyCount++;

        const chapterCount = manifest?.chapters?.length || 0;
        const savedCh = isReady
          ? parseInt(localStorage.getItem(`progress_${book.id}_ch`) || '1') : 0;
        const pct = chapterCount > 0
          ? Math.min(100, Math.round((savedCh - 1) / chapterCount * 100)) : 0;

        if (isReady) {
          bookDataMap[book.id] = { book, manifest, chapterCount, savedCh, pct };
        }

        const card = document.createElement('div');
        card.className = 'book-card' + (isReady ? '' : ' dimmed');
        card.dataset.bookType = book.type;

        if (isReady) {
          card.innerHTML = `
            <div class="book-meta">${book.type} · ${book.source}</div>
            <div class="book-title">${book.title}</div>
            <div class="book-desc">${book.desc || book.author}</div>
            <div class="book-stats">
              <div class="stat"><div class="stat-val">${chapterCount}</div><div class="stat-lbl">Chapters</div></div>
              <div class="stat"><div class="stat-val">${savedCh}</div><div class="stat-lbl">Last Read</div></div>
              <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">Progress</div></div>
            </div>
            <div class="book-progress">
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
              <div class="progress-text">Chapter ${savedCh} / ${chapterCount}</div>
            </div>
            <div class="read-btn">詳細資訊 →</div>
          `;
          card.addEventListener('click', () => openDrawer(book.id));
        } else {
          card.innerHTML = `
            <div class="coming-soon-badge">即將推出</div>
            <div class="book-meta">${book.type} · ${book.source}</div>
            <div class="book-title">${book.title}</div>
            <div class="book-desc">${book.author}</div>
          `;
        }

        container.appendChild(card);
        allCards.push({ card, bookType: book.type });
      }

      document.getElementById('lib-count').textContent = `${readyCount} / ${books.length} books`;
      if (books.length === 0) document.getElementById('empty').style.display = 'block';
    }

    loadLibrary();
  </script>
</body>
