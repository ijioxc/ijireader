<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bilingual Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Noto+Serif+TC:wght@200;300;400&family=Noto+Sans+TC:wght@400;700&family=DM+Mono:wght@300;400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ══ CSS 變數 ══ */
:root {
  --bg0:#0f0f12;--bg1:#131317;--bg2:#1a1a20;--bg3:#22222a;
  --b0:rgba(255,255,255,0.04);--b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.14);
  --t1:#ede6dc;--t2:#bab4ab;--t3:#8a8490;
  --gold:#c8a96e;--gold-dim:rgba(200,169,110,0.12);--gold-glow:rgba(200,169,110,0.06);
  --ice:#8bbfcf;--ice-dim:rgba(139,191,207,0.1);
  --green:#4e9470;--red:#b05555;
  --serif-en:'Cormorant Garamond',Georgia,serif;
  --serif-zh:'Noto Serif TC','Songti SC',serif;
  --mono:'DM Mono',monospace;
  --font-scale:1.0;--top-h:56px;
}
body.t-day{--bg0:#f7f4ef;--bg1:#f0ece5;--bg2:#e8e3da;--b0:rgba(0,0,0,0.04);--b1:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);--t1:#1e1c18;--t2:#5a5650;--t3:#8a8480;--gold:#8a6030;--gold-dim:rgba(138,96,48,0.1);--gold-glow:rgba(138,96,48,0.05);--ice:#3a7090;--ice-dim:rgba(58,112,144,0.1);}
body.t-sepia{--bg0:#1c1714;--bg1:#201b17;--bg2:#26211c;--b0:rgba(255,255,255,0.03);--b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);--t1:#f0e8d8;--t2:#9a907e;--t3:#5a5044;--gold:#c49a55;--gold-dim:rgba(196,154,85,0.14);--gold-glow:rgba(196,154,85,0.07);--ice:#a0c4a0;--ice-dim:rgba(160,196,160,0.12);}
body.t-paper{--bg0:#f5f0e8;--bg1:#ede8df;--bg2:#e8e2d8;--b0:rgba(0,0,0,0.04);--b1:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.14);--t1:#2a2418;--t2:#6a6055;--t3:#9a9088;--gold:#8a6a30;--gold-dim:rgba(138,106,48,0.1);--gold-glow:rgba(138,106,48,0.05);--ice:#4a7a8a;--ice-dim:rgba(74,122,138,0.1);--green:#2a7a50;--red:#8a3030;}
body.t-oled{--bg0:#000;--bg1:#080808;--bg2:#101010;--b0:rgba(255,255,255,0.03);--b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);--t1:#f0ebe4;--t2:#706a64;--t3:#383832;--gold:#d4aa6a;--gold-dim:rgba(212,170,106,0.1);--gold-glow:rgba(212,170,106,0.05);--ice:#7ab4c8;--ice-dim:rgba(122,180,200,0.1);}

/* 字體 */
body.f-merriweather .sp-en{font-family:'Merriweather',serif;}
body.f-georgia .sp-en{font-family:Georgia,serif;}
body.f-lora .sp-en{font-family:'Lora',serif;}
body.f-garamond .sp-en{font-family:'Cormorant Garamond',Georgia,serif;}
body.f-inter .sp-en{font-family:'Inter',sans-serif;}
body.f-jetbrains .sp-en{font-family:'JetBrains Mono',monospace;}
body.fz-sans .sp-zh{font-family:'Noto Sans TC',sans-serif;}
body.fz-kai .sp-zh{font-family:'Kaiti SC','標楷體',serif;}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg0);color:var(--t1);font-family:var(--serif-en);min-height:100vh;overflow-x:hidden;}

/* 背景光暈 */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 15% 25%,rgba(200,169,110,0.07) 0%,transparent 65%),radial-gradient(ellipse 50% 50% at 85% 75%,rgba(139,191,207,0.05) 0%,transparent 65%);}
body.t-day::before,body.t-paper::before{background:radial-gradient(ellipse 60% 40% at 15% 25%,rgba(138,96,48,0.05) 0%,transparent 65%);}

/* ══ TOP BAR ══ */
#top{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:rgba(15,15,18,0.85);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-bottom:0.5px solid var(--b1);z-index:200;}
body.t-day #top,body.t-paper #top{background:rgba(247,244,239,0.9);}
.hdr-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.hdr-left{flex:1;display:flex;align-items:center;gap:8px;}
.hdr-center{flex:0 1 auto;display:flex;align-items:center;gap:12px;justify-content:center;}
.hdr-right{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:8px;}

.ic,.bb{width:36px;height:36px;border:0.5px solid var(--b1)!important;border-radius:8px!important;background:var(--b0)!important;color:var(--t2)!important;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;text-decoration:none;font-size:16px;flex-shrink:0;}
.ic:hover,.bb:hover{border-color:var(--gold)!important;color:var(--gold)!important;background:var(--gold-dim)!important;}
.ic svg,.bb svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
#book-title-top{font-family:var(--mono);font-size:9px;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;}
#mode-badge{font-family:var(--serif-en);font-size:12px;font-style:italic;color:var(--t3);}

/* ══ POPOVERS ══ */
#tr,#vtr{position:relative;}
#sov,#vov{position:absolute;top:calc(100% + 10px);right:0;width:310px;background:rgba(22,22,28,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid var(--b2);border-radius:14px;z-index:1000;display:none;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(200,169,110,0.1);animation:pop-in 0.2s ease-out;}
#sov.show,#vov.show{display:flex;}
body.t-day #sov,body.t-paper #sov,body.t-day #vov,body.t-paper #vov{background:rgba(240,236,230,0.96);}
@keyframes pop-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.sphd{padding:12px 16px;border-bottom:0.5px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.sphd-title{font-family:var(--mono);font-size:9px;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;}
.spx{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;transition:color 0.2s;line-height:1;}
.spx:hover{color:var(--gold);}
.spb{padding:14px 16px;max-height:62vh;overflow-y:auto;}
.sps{margin-bottom:14px;}
.spst{font-family:var(--mono);font-size:9px;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.spnote{font-family:var(--mono);font-size:9px;color:var(--t3);line-height:1.8;}
.st-title{font-size:11px;color:var(--t3);margin-bottom:4px;}
.st-title.mt{margin-top:8px;}
.st-sub{font-size:8px;color:var(--t3);margin-bottom:4px;letter-spacing:0.05em;}
.st-note-mt{margin-top:6px;}
.st-divider{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--b1);}
.vtabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-bottom:10px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.mb-12{margin-bottom:12px!important;}
.mt-6{margin-top:6px;}
.vt{background:var(--b0);border:0.5px solid var(--b1);border-radius:6px;color:var(--t2);padding:6px 10px;font-size:11px;font-family:var(--serif-zh);cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;text-align:center;}
.vt:hover{background:var(--b1);border-color:var(--b2);color:var(--t1);}
.vt.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.vt.ice-on{background:var(--ice-dim);border-color:var(--ice);color:var(--ice);}
.save-btn{width:100%;padding:7px;border:0.5px solid var(--b1);background:var(--b0);border-radius:6px;color:var(--t2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all 0.2s;margin-top:4px;}
.save-btn:hover{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.red-btn{border-color:rgba(176,85,85,.3)!important;background:rgba(176,85,85,.1)!important;color:var(--red)!important;}
.red-btn:hover{background:rgba(176,85,85,.2)!important;border-color:rgba(176,85,85,.5)!important;}
.api-input{width:100%;background:var(--bg2);border:1px solid var(--b1);color:var(--t1);padding:6px 8px;border-radius:5px;font-family:var(--mono);font-size:10px;margin-bottom:6px;}
.api-input:focus{outline:none;border-color:var(--gold);}
.api-note{font-family:var(--mono);font-size:8px;color:var(--t3);line-height:1.7;}
.api-note.mt{margin-top:8px;}
.tl-stats{font-family:var(--mono);font-size:9px;color:var(--t3);background:var(--bg2);border:1px solid var(--b1);border-radius:5px;padding:8px;line-height:2;}
.voice-tabs{display:flex;gap:8px;}
.voice-bundle{display:flex;flex:2;border:0.5px solid var(--b2);border-radius:6px;overflow:hidden;}
.voice-btn-reset{border:none!important;border-radius:0!important;margin:0!important;}
.voice-mix-btn{flex:1;border-radius:6px;}
.v-divider{width:0.5px;background:var(--b2);}
.halo-wrapper{text-align:center;margin-top:10px;margin-bottom:20px;opacity:0.2;transition:opacity 0.3s;}
.halo-wrapper:hover{opacity:1;}
.halo-btn{background:transparent;border:2px solid var(--gold);color:var(--gold);width:50px;height:50px;border-radius:50%;font-size:9px;cursor:pointer;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(200,169,110,0.3);transition:all 0.3s;}
.vi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background 0.2s;border:0.5px solid transparent;margin-bottom:4px;}
.vi:hover{background:var(--b0);border-color:var(--b1);}
.vi.es,.vi.zs,.vi.ms{background:var(--gold-dim);border-color:var(--gold);}
.vi-info{flex:1;min-width:0;}
.vi-n{font-family:var(--mono);font-size:10px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vi-l{font-family:var(--mono);font-size:8px;color:var(--t3);}
.vi-q{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:4px;}
.vi-q.n{background:rgba(78,148,112,0.15);color:var(--green);}
.vi-q.p{background:var(--gold-dim);color:var(--gold);}
.vi-q.s{background:var(--b0);color:var(--t3);}
.pvb{width:24px;height:24px;border:0.5px solid var(--b1);border-radius:4px;background:var(--b0);color:var(--t3);font-size:9px;cursor:pointer;}
.pvb:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
.no-voice{font-size:10px;padding:6px;color:var(--t3);}

/* ══ SIDEBAR ══ */
#layout{display:flex;min-height:calc(100vh - var(--top-h));margin-top:var(--top-h);position:relative;z-index:1;}
#sb{width:260px;background:rgba(19,19,23,0.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:0.5px solid var(--b1);height:calc(100vh - var(--top-h));position:fixed;top:var(--top-h);left:0;overflow-y:auto;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);z-index:150;}
body.t-day #sb,body.t-paper #sb{background:rgba(242,238,232,0.94);}
#sbhd{font-family:var(--mono);font-size:9px;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;padding:16px 16px 10px;border-bottom:0.5px solid var(--b1);}
#sb.collapsed{transform:translateX(-100%);}
#sb.collapsed~#main{margin-left:0!important;}
#main{flex:1;margin-left:260px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);min-width:0;display:flex;flex-direction:column;height:calc(100vh - var(--top-h));overflow:hidden;}
@media(max-width:640px){#sb{transform:translateX(-100%);top:0;height:100vh;z-index:1000;}#sb.open{transform:translateX(0);}#main{margin-left:0!important;}}
#sb-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:999;display:none;}
#sb-overlay.show{display:block;}
#sbl{padding:0;margin:0;}
details{border-bottom:0.5px solid var(--b1);}
summary{padding:11px 16px;cursor:pointer;font-family:var(--serif-en);font-size:13px;color:var(--t1);font-weight:500;outline:none;transition:all 0.2s;list-style:none;}
summary::-webkit-details-marker{display:none;}
summary:hover{background:var(--b0);color:var(--gold);}
details[open] summary{border-bottom:0.5px solid var(--b1);color:var(--gold);}
.si{padding:10px 16px 10px 28px;cursor:pointer;border-bottom:0.5px solid var(--b0);font-family:var(--mono);font-size:10px;color:var(--t3);transition:all 0.2s;letter-spacing:0.04em;}
.si:hover{background:var(--b0);color:var(--t2);}
.si.on{background:var(--gold-glow);color:var(--gold);border-left:2px solid var(--gold);}
.si.read{opacity:0.4;}

/* ══ READING AREA ══ */
#scroll{flex:1;overflow-y:auto;min-height:0;padding:20px 24px 120px;}
#slist{max-width:740px;margin:0 auto;position:relative;z-index:1;}
#ch-loading{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:0.1em;padding:40px;text-align:center;display:none;}
#ch-loading.show{display:block;}
.error-msg{padding:40px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--red);}

/* ══ 卡片 ══ */
.sp{margin-bottom:12px;padding:18px 20px;border:0.5px solid rgba(255,255,255,0.05);border-radius:12px;background:rgba(255,255,255,0.04);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);cursor:pointer;transition:all 0.3s ease;}
body.t-day .sp,body.t-paper .sp{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.07);}
.sp:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12);}
body.t-day .sp:hover,body.t-paper .sp:hover{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.12);}
.sp.on{background:var(--gold-dim)!important;border-color:rgba(200,169,110,0.3)!important;box-shadow:inset 0 0 40px var(--gold-glow),0 4px 20px rgba(0,0,0,0.2);}
body.t-day .sp.on,body.t-paper .sp.on{background:rgba(138,106,48,0.08)!important;border-color:rgba(138,106,48,0.25)!important;}
.sp-n{font-family:var(--mono);font-size:8px;letter-spacing:0.12em;color:var(--t3);margin-bottom:10px;display:block;opacity:0.5;transition:opacity 0.3s,color 0.3s;}
.sp.on .sp-n{color:var(--gold);opacity:1;}
.sp-en{font-family:var(--serif-en);font-size:calc(18px * var(--font-scale));font-style:italic;font-weight:300;line-height:1.85;letter-spacing:0.01em;color:rgba(237,230,220,0.45);margin-bottom:10px;white-space:pre-wrap;transition:color 0.3s;text-align:left;}
.sp-zh{font-family:var(--serif-zh);font-size:calc(14px * var(--font-scale));font-weight:300;line-height:1.9;letter-spacing:0.05em;color:rgba(138,132,144,0.5);white-space:pre-wrap;transition:color 0.3s;text-align:right;}
.sp.on .sp-en{color:var(--t1);}
.sp.on .sp-zh{color:var(--t2);}
body.t-day .sp .sp-en,body.t-paper .sp .sp-en{color:rgba(30,28,24,0.35);}
body.t-day .sp .sp-zh,body.t-paper .sp .sp-zh{color:rgba(90,86,80,0.45);}
body.t-day .sp.on .sp-en,body.t-paper .sp.on .sp-en{color:var(--t1);}
body.t-day .sp.on .sp-zh,body.t-paper .sp.on .sp-zh{color:var(--t2);}
.dialogue{display:block;text-align:center;font-style:normal;color:var(--gold);opacity:0.9;}
.emphasis{color:var(--ice);font-style:italic;}
.empty-trans{min-height:30px;}
body.order-zh .sen-row{display:flex;flex-direction:column;}
body.order-zh .sen-row .sp-zh{order:-1;text-align:left;margin-bottom:10px;}
body.order-zh .sen-row .sp-en{margin-bottom:0;}
@media(min-width:900px){
  #slist{max-width:1080px;}
  .sen-row{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;}
  body.order-zh .sen-row{display:grid;flex-direction:unset;}
  body.order-zh .sen-row .sp-zh{order:unset;}
  .sp-zh{text-align:left;border-left:0.5px solid var(--b1);padding-left:32px;}
  body.order-zh .sp-zh{border-left:none;padding-left:0;border-right:0.5px solid var(--b1);padding-right:32px;text-align:right;}
  .sp-en{font-size:calc(17px * var(--font-scale));margin-bottom:0;}
}
.c-gold{color:var(--gold)!important;}
.c-ice{color:var(--ice)!important;}
.c-green{color:var(--green)!important;}
.d-none{display:none!important;}

/* ══ BOTTOM PLAYER ══ */
#ctrls{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,16,0.88);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-top:0.5px solid var(--b1);z-index:200;display:flex;flex-direction:column;}
body.t-day #ctrls,body.t-paper #ctrls{background:rgba(242,238,232,0.92);}
#npw{padding:10px 20px 0;}
#prrow{display:flex;align-items:center;gap:10px;}
#prbar{flex:1;height:2px;background:var(--b1);border-radius:2px;cursor:pointer;position:relative;}
#prfill{height:100%;background:linear-gradient(90deg,var(--gold),#e8c88e);border-radius:2px;position:relative;width:0%;transition:width 0.3s;}
#prfill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px rgba(200,169,110,0.5);}
#prtxt{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:0.08em;white-space:nowrap;min-width:40px;text-align:right;}
.ctrl-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 20px 14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));gap:0;}
.ctrl-left{display:flex;align-items:center;gap:7px;justify-content:flex-start;flex-wrap:nowrap;}
.ctrl-center{display:flex;align-items:center;gap:8px;justify-content:center;}
.ctrl-right{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.pbig{width:46px;height:46px;border-radius:13px;background:rgba(200,169,110,0.15);border:1px solid var(--gold)!important;color:var(--gold);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;flex-shrink:0;}
.pbig:hover{background:rgba(200,169,110,0.25);}
.psk{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1)!important;color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.psk:hover{border-color:var(--gold)!important;color:var(--gold);background:var(--gold-dim);}
body.t-day .psk,body.t-paper .psk{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1)!important;}
#mg-lang{display:flex;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.04);}
body.t-day #mg-lang,body.t-paper #mg-lang{border-color:rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);}
.mb{height:32px;padding:0 10px;background:transparent;border:none!important;border-right:0.5px solid rgba(255,255,255,0.08)!important;color:var(--t3);font-family:var(--mono);font-size:10px;letter-spacing:0.04em;cursor:pointer;transition:all 0.2s;}
.mb:last-child{border-right:none!important;}
.mb.on,.mb:hover{background:var(--gold-dim);color:var(--gold);}
body.t-day .mb,body.t-paper .mb{border-right-color:rgba(0,0,0,0.08)!important;}
.abtn{height:32px;padding:0 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1)!important;color:var(--t3);font-family:var(--mono);font-size:10px;letter-spacing:0.06em;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s;flex-shrink:0;}
.abtn.on{border-color:var(--ice)!important;color:var(--ice);background:var(--ice-dim);}
.adot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
body.t-day .abtn,body.t-paper .abtn{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1)!important;}
.spd{display:flex;align-items:center;gap:7px;}
.spd label{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:0.1em;}
.spd input[type="range"]{width:68px;height:2px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.12);border-radius:2px;outline:none;cursor:pointer;}
.spd input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold);box-shadow:0 0 5px rgba(200,169,110,0.35);cursor:pointer;}
body.t-day .spd input[type="range"],body.t-paper .spd input[type="range"]{background:rgba(0,0,0,0.15);}
@media(max-width:640px){.spd{display:none;}.ctrl-row{grid-template-columns:auto auto auto;gap:8px;justify-content:center;padding:8px 16px 12px;padding-bottom:calc(12px + env(safe-area-inset-bottom));}.ctrl-left,.ctrl-right{flex:none;}#scroll{padding:16px 14px 120px;}}

/* 光暈 */
.sp-tl-halo{position:fixed;width:40px;height:40px;z-index:500;pointer-events:auto;cursor:pointer;transform:translate(-50%,-50%);}
.halo-tooltip{position:absolute;width:100%;height:100%;border:1px solid var(--gold);border-radius:50%;color:var(--gold);font-family:var(--mono);font-size:6px;display:flex;align-items:center;justify-content:center;letter-spacing:0.05em;animation:halo-spin 4s linear infinite;opacity:0.7;}
.halo-tooltip.t-2{animation-duration:6s;animation-direction:reverse;width:130%;height:130%;top:-15%;left:-15%;border-color:var(--ice);color:var(--ice);opacity:0.5;}
@keyframes halo-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sp-tl-halo.ripple-active::after{content:'';position:absolute;inset:-20px;border-radius:50%;background:rgba(200,169,110,0.3);animation:ripple 0.8s ease-out;}
@keyframes ripple{from{transform:scale(0);opacity:1}to{transform:scale(3);opacity:0}}
</style>
</head>

<script>
const P=new URLSearchParams(location.search);
const BOOK_ID=P.get('book')||'shadow_slave';
const BOOK_BASE=`books/${BOOK_ID}`;
const READ_MODE=localStorage.getItem('readMode')||'legacy';
const DISPLAY_ORDER=localStorage.getItem('displayOrder')||'zh';
let manifest=null,currentChapterData=null,currentChIdx=0,currentParaIndex=0;
let isPlaying=false,isAuto=true,currentLangMode='both',rate=1.0;
const themes=['t-midnight','t-day','t-sepia','t-paper','t-oled'];
const SY=window.speechSynthesis;
let allV=[],enV=null,zhV=null,mixV=null,vtab='en',useMixVoice=false;
let deeplKey=localStorage.getItem('deepl_api_key')||'';
let geminiKey=localStorage.getItem('gemini_api_key')||'';
let currentEngine=localStorage.getItem('translation_engine')||'deepl';

// IndexedDB
const DB_NAME='BilingualReader',DB_VER=1;let db=null;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB_NAME,DB_VER);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('translations'))d.createObjectStore('translations',{keyPath:'id'});if(!d.objectStoreNames.contains('progress'))d.createObjectStore('progress',{keyPath:'id'});};q.onsuccess=e=>r(e.target.result);q.onerror=e=>j(e.target.error);})}
function idbGet(s,k){return new Promise((r,j)=>{const t=db.transaction(s,'readonly'),q=t.objectStore(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);})}
function idbPut(s,v){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite'),q=t.objectStore(s).put(v);q.onsuccess=()=>r();q.onerror=()=>j(q.error);})}
function idbCount(s){return new Promise((r,j)=>{const t=db.transaction(s,'readonly'),q=t.objectStore(s).count();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);})}
function idbClear(s){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite'),q=t.objectStore(s).clear();q.onsuccess=()=>r();q.onerror=()=>j(q.error);})}
function tlKey(c,i){return`${BOOK_ID}_${c}_${i}`}
async function getZh(c,i){try{return(await idbGet('translations',tlKey(c,i)))?.zh||''}catch{return''}}
async function setZh(c,i,zh){try{await idbPut('translations',{id:tlKey(c,i),zh})}catch{}}
async function saveProg(c,i){localStorage.setItem(`progress_${BOOK_ID}_ch`,c);localStorage.setItem(`progress_${BOOK_ID}_para`,i);try{await idbPut('progress',{id:BOOK_ID,chId:c,paraIdx:i})}catch{}}
async function loadProg(){try{const r=await idbGet('progress',BOOK_ID);if(r)return{chId:r.chId,paraIdx:r.paraIdx}}catch{}return{chId:parseInt(localStorage.getItem(`progress_${BOOK_ID}_ch`)||'1'),paraIdx:parseInt(localStorage.getItem(`progress_${BOOK_ID}_para`)||'0')}}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
window.addEventListener('online',()=>badge(false));window.addEventListener('offline',()=>badge(true));
window.addEventListener('keydown',e=>{if((e.key===' '||e.code==='Space')&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){e.preventDefault();togglePlay();}});
function badge(off){let b=document.getElementById('_badge');if(!b){b=document.createElement('div');b.id='_badge';b.style.cssText='position:fixed;bottom:100px;right:12px;background:var(--bg2);border:0.5px solid var(--b2);border-radius:6px;padding:5px 10px;font-family:"DM Mono",monospace;font-size:9px;z-index:300;transition:.3s';document.body.appendChild(b);}b.textContent=off?'⚡ 離線':'● 已連線';b.style.color=off?'var(--gold)':'var(--green)';b.style.opacity='1';if(!off)setTimeout(()=>b.style.opacity='0',2000);}

window.onload=async()=>{
  setTheme(localStorage.getItem('selectedTheme')||'t-midnight');
  updateFontScale(localStorage.getItem('fontScale')||'1.0');
  setFont(localStorage.getItem('selectedFont')||'f-merriweather');
  setZhFont(localStorage.getItem('selectedZhFont')||'fz-serif');
  document.body.classList.toggle('m-edge',READ_MODE==='edge');
  document.getElementById('mode_legacy').classList.toggle('on',READ_MODE==='legacy');
  document.getElementById('mode_edge').classList.toggle('ice-on',READ_MODE==='edge');
  document.body.classList.toggle('order-zh',DISPLAY_ORDER==='zh');
  document.getElementById('ord_en').classList.toggle('on',DISPLAY_ORDER==='en');
  document.getElementById('ord_zh').classList.toggle('on',DISPLAY_ORDER==='zh');
  document.getElementById('mode-badge').textContent=READ_MODE.toUpperCase();
  if(READ_MODE==='legacy'){if(SY.onvoiceschanged!==undefined)SY.onvoiceschanged=()=>{pickV();if(document.getElementById('vov').classList.contains('show'))renderV(vtab);};pickV();}
  if(deeplKey)document.getElementById('deeplKey').value=deeplKey;
  if(geminiKey)document.getElementById('geminiKey').value=geminiKey;
  setEngine(currentEngine);
  if(!navigator.onLine)badge(true);
  try{db=await openDB()}catch{}
  try{
    manifest=await fetch(`${BOOK_BASE}/manifest.json`).then(r=>r.json());
    document.getElementById('book-title-top').textContent=manifest.title||BOOK_ID;
    document.title=manifest.title||'Bilingual Reader';
    renderSidebar();
    const{chId,paraIdx}=await loadProg();
    const idx=manifest.chapters.findIndex(c=>c.id===chId);
    await loadCh(idx>=0?idx:0,paraIdx);
  }catch(e){console.error(e);showError('無法載入書目');}
};

function toggleSettings(){const s=document.getElementById('sov');document.getElementById('vov').classList.remove('show');const show=s.classList.toggle('show');if(show)updateTlStats();}
function toggleVoice(){const v=document.getElementById('vov');document.getElementById('sov').classList.remove('show');const show=v.classList.toggle('show');if(show&&READ_MODE==='legacy'){if(!allV.length)pickV();renderV(vtab);}}
document.addEventListener('click',e=>{
  const tr=document.getElementById('tr'),sov=document.getElementById('sov');
  const vtr=document.getElementById('vtr'),vov=document.getElementById('vov');
  if(sov.classList.contains('show')&&!tr.contains(e.target))sov.classList.remove('show');
  if(vov.classList.contains('show')&&!vtr.contains(e.target))vov.classList.remove('show');
});

function toggleSidebar(){if(window.innerWidth<=640){document.getElementById('sb').classList.toggle('open');document.getElementById('sb-overlay').classList.toggle('show');}else document.getElementById('sb').classList.toggle('collapsed');}
function closeSidebar(){document.getElementById('sb').classList.remove('open');document.getElementById('sb-overlay').classList.remove('show');}

function renderSidebar(){
  const sbl=document.getElementById('sbl');if(!sbl)return;sbl.innerHTML='';
  const ru=parseInt(localStorage.getItem(`progress_${BOOK_ID}_ch`)||'1');
  const GS=100,tot=manifest.chapters.length;
  for(let i=0;i<Math.ceil(tot/GS);i++){
    const s=i*GS,e=Math.min((i+1)*GS,tot);
    const det=document.createElement('details');
    const sum=document.createElement('summary');sum.textContent=`Ch ${s+1}–${e}`;det.appendChild(sum);
    const ul=document.createElement('ul');ul.style.cssText='list-style:none;padding:0;margin:0';det.appendChild(ul);
    det.addEventListener('toggle',()=>{if(det.open&&ul.children.length===0)for(let j=s;j<e;j++){const ch=manifest.chapters[j];const li=document.createElement('li');li.className='si';li.id=`si_${j}`;li.textContent=`${String(ch.id).padStart(4,'0')} ${ch.title.replace(/^.*?Chapter\s*\d+\s*[-–—·]\s*/i,'').substring(0,36)}`;if(ch.id<ru)li.classList.add('read');if(j===currentChIdx)li.classList.add('on');li.onclick=()=>{loadCh(j,0,true);closeSidebar();};ul.appendChild(li);}});
    sbl.appendChild(det);
  }
}

async function loadCh(idx,resumePara=0,autoPlay=false){
  if(!manifest||idx<0||idx>=manifest.chapters.length)return;
  currentChIdx=idx;const cm=manifest.chapters[idx];
  document.getElementById('ch-loading').classList.add('show');
  document.getElementById('slist').innerHTML='';
  try{
    const ck=`ch_${BOOK_ID}_${cm.id}`;let raw;
    const sc=sessionStorage.getItem(ck);
    if(sc)raw=JSON.parse(sc);else{raw=await fetch(`${BOOK_BASE}/${cm.url}`).then(r=>r.json());sessionStorage.setItem(ck,JSON.stringify(raw));}
    const paragraphs=parseChapter(raw);
    currentChapterData={id:cm.id,title:cm.title,paragraphs};
    document.getElementById('ch-loading').classList.remove('show');
    document.getElementById('book-title-top').textContent=cm.title||manifest.title||BOOK_ID;
    document.querySelectorAll('#sbl .si').forEach(el=>el.classList.remove('on'));
    document.getElementById(`si_${idx}`)?.classList.add('on');
    if(READ_MODE==='edge')await renderEdge();else await renderLegacy();
    await selectPara(Math.min(resumePara,paragraphs.length-1));
    await saveProg(cm.id,resumePara);
    if(autoPlay&&READ_MODE==='legacy'){translateChapter();isPlaying=true;updatePlayBtn();speakCurrent();}
  }catch(e){document.getElementById('ch-loading').classList.remove('show');console.error(e);showError(`無法載入 Chapter ${cm.id}`);}
}
function parseChapter(raw){const en=raw.content_en||'',zh=raw.content_zh||'';const eB=en.includes('\n\n')?en.split(/\n\n+/):en.split('\n');const zB=zh.includes('\n\n')?zh.split(/\n\n+/):zh.split('\n');return eB.map(s=>s.trim()).filter(Boolean).map((e,i)=>({en:e,zh:(zB[i]||'').trim()}));}
function changeChapter(d){const n=currentChIdx+d;if(n>=0&&n<manifest.chapters.length){if(isPlaying&&READ_MODE==='legacy'){isPlaying=false;SY.cancel();updatePlayBtn();}loadCh(n,0,true);}}

function smartZhSplit(z,n){const ZH=/[，。、！？；…：]/,tot=z.length,ls=[];let last=0;for(let i=1;i<n;i++){const t=Math.round(tot*(i/n)),r=Math.round(tot*0.2),lo=Math.max(last+1,t-r),hi=Math.min(tot-1,t+r);let best=t,min=Infinity;for(let j=lo;j<=hi;j++)if(ZH.test(z[j])){const d=Math.abs(j-t);if(d<min){min=d;best=j+1;}}ls.push(z.substring(last,best));last=best;}ls.push(z.substring(last));return ls;}
function wrapD(text,lang){const rx=lang==='en'?/("[^"]+"|"[^"]+")/g:/(「[^」]+」|『[^』]+』|"[^"]+"|"[^"]+")/g;return text.replace(rx,(m,_,off)=>{const c=m.slice(1,-1);if(c.length>=8)return`<span class="dialogue">${m}</span>`;const b=text.substring(Math.max(0,off-5),off),a=text.substring(off+m.length,Math.min(text.length,off+m.length+5));if(/[說道喊問想聽答笑]/.test(b)||/[說道喊問想聽答笑]/.test(a))return`<span class="dialogue">${m}</span>`;return`<span class="emphasis">${m}</span>`;});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function renderLegacy(){
  const sl=document.getElementById('slist');sl.innerHTML='';if(!currentChapterData)return;
  const cached=await Promise.all(currentChapterData.paragraphs.map((_,i)=>getZh(currentChapterData.id,i)));
  window.hasUntranslated=false;
  currentChapterData.paragraphs.forEach((p,pi)=>{
    const zh=cached[pi]||p.zh||'';
    const rawEL=p.en.replace(/([^,.!?]{10,}[,.!?])\s+/g,'$1\n').split('\n').filter(Boolean);
    const enLines=rawEL.reduce((a,l)=>{if(/^(and|or|but|nor)\s/i.test(l)&&a.length>0)a[a.length-1]+=' '+l;else a.push(l);return a;},[]);
    const enT=enLines.map(l=>wrapD(esc(l),'en')).join('\n');
    const zhT=smartZhSplit(zh,enLines.length).map(l=>wrapD(esc(l),'zh')).join('\n');
    if(!zh)window.hasUntranslated=true;
    const div=document.createElement('section');div.className='sp';div.id=`sp_${pi}`;
    const eEl=`<div class="sp-en">${enT}</div>`;
    const zEl=`<div class="sp-zh">${zh?zhT:'<div class="empty-trans"></div>'}</div>`;
    div.innerHTML=`<span class="sp-n">${pi+1}</span><div class="sen-row">${DISPLAY_ORDER==='zh'?zEl+eEl:eEl+zEl}</div>`;
    div.onclick=e=>{if(!e.target.classList.contains('sp-tl'))selectPara(pi);};
    sl.appendChild(div);
  });
  checkHalo();await updateNP();
}

  ['top','ctrls','sb','sb-overlay'].forEach(id=>document.getElementById(id)?.setAttribute('aria-hidden','true'));

    const zh=cached[pi]||p.zh||'';
    const rawEL=p.en.replace(/([^,.!?]{10,}[,.!?])\s+/g,'$1\n').split('\n').filter(Boolean);
    const enLines=rawEL.reduce((a,l)=>{if(/^(and|or|but|nor)\s/i.test(l)&&a.length>0)a[a.length-1]+=' '+l;else a.push(l);return a;},[]);
    const enT=enLines.map(l=>wrapD(esc(l),'en')).join('\n');
    const zhT=smartZhSplit(zh,enLines.length).map(l=>wrapD(esc(l),'zh')).join('\n');
    if(!zh)window.hasUntranslated=true;
    const div=document.createElement('section');div.className='sp';div.id=`sp_${pi}`;
    const eEl=`<div class="sp-en" lang="en-US">${enT}</div>`;

    div.onclick=e=>{if(!e.target.classList.contains('sp-tl'))selectPara(pi);};

  });
  checkHalo();
}

async function selectPara(idx){
  const tot=document.querySelectorAll('#slist .sp').length;
  idx=Math.max(0,Math.min(idx,tot-1));currentParaIndex=idx;
  document.querySelectorAll('#slist .sp').forEach((el,i)=>el.classList.toggle('on',i===idx));
  document.getElementById(`sp_${idx}`)?.scrollIntoView({behavior:'smooth',block:'center'});
  await saveProg(currentChapterData.id,idx);
  if(READ_MODE==='legacy'){await updateNP();hideHL();}
}
async function updateNP(){
  if(!currentChapterData)return;
  document.getElementById('prtxt').textContent=`${currentParaIndex+1} / ${currentChapterData.paragraphs.length}`;
  document.getElementById('prfill').style.width=`${((currentParaIndex+1)/currentChapterData.paragraphs.length)*100}%`;
}

// Translation
function checkHalo(){
  if(window.hasUntranslated){
    let h=document.getElementById('global-halo');
    if(!h){
      h=document.createElement('div');h.id='global-halo';h.className='sp-tl-halo';h.onclick=()=>{h.classList.add('ripple-active');translateChapter();setTimeout(()=>{h.style.display='none';h.classList.remove('ripple-active');},800);};
      h.innerHTML='<span class="halo-tooltip t-1">TRANSLATE</span><span class="halo-tooltip t-2">翻譯全篇</span>';
      document.body.appendChild(h);
      h.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(15);opacity:0;transition:none;';
      let cx=innerWidth/2,cy=innerHeight/2,tx=cx,ty=cy;
      document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
      const f=()=>{cx+=(tx-cx)*0.05;cy+=(ty-cy)*0.05;h.style.left=`${cx}px`;h.style.top=`${cy}px`;requestAnimationFrame(f);};
      setTimeout(()=>{h.style.transition='transform 1.5s cubic-bezier(0.65,0,0.35,1),opacity 1s ease';h.style.opacity='1';h.style.transform='translate(-50%,-50%) scale(1)';f();},50);
    }
  }else{document.getElementById('global-halo')?.style.setProperty('display','none');}
}
function setEngine(e){currentEngine=e;localStorage.setItem('translation_engine',e);document.getElementById('eng_deepl').classList.toggle('on',e==='deepl');document.getElementById('eng_gemini').classList.toggle('on',e==='gemini');document.getElementById('deepl_section').style.display=e==='deepl'?'block':'none';document.getElementById('gemini_section').style.display=e==='gemini'?'block':'none';}
function saveApiKey(){const k=document.getElementById('deeplKey').value.trim();if(!k)return;deeplKey=k;localStorage.setItem('deepl_api_key',k);alert('✓ 已儲存');}
function saveGeminiKey(){const k=document.getElementById('geminiKey').value.trim();if(!k)return;geminiKey=k;localStorage.setItem('gemini_api_key',k);alert('✓ 已儲存');}
function activateHalo(){const i=document.getElementById('deeplKey');if(i){i.value='f346ab96-c47f-42d1-99d6-36a683eb3cf5:fx';saveApiKey();}}
async function callTrans(ts){if(geminiKey)try{return await callGemini(ts)}catch{}if(deeplKey)return await callDeepL(ts);throw new Error('請設定 API Key');}
async function callGemini(ts){const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`;const res=await fetch(`https://wispy-block-436f.ijioxc.workers.dev/?url=${encodeURIComponent(url)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`Translate ${ts.length} English sentences to Traditional Chinese. Output ONLY a JSON array of ${ts.length} strings.\nInput: ${JSON.stringify(ts)}`}]}],generationConfig:{response_mime_type:'application/json'}})});if(!res.ok)throw new Error(`Gemini ${res.status}`);const raw=(await res.json()).candidates?.[0]?.content?.parts?.[0]?.text||'';const m=raw.match(/\[[\s\S]*\]/);if(m)return JSON.parse(m[0]);throw new Error('parse');}
async function callDeepL(ts){const ep=deeplKey.endsWith(':fx')?'https://api-free.deepl.com/v2/translate':'https://api.deepl.com/v2/translate';const res=await fetch(`https://wispy-block-436f.ijioxc.workers.dev/?url=${encodeURIComponent(ep)}`,{method:'POST',headers:{'Authorization':`DeepL-Auth-Key ${deeplKey}`,'Content-Type':'application/json'},body:JSON.stringify({text:ts,source_lang:'EN',target_lang:'ZH-HANT'})});if(!res.ok)throw new Error(`DeepL ${res.status}`);return(await res.json()).translations.map(t=>t.text);}
async function translateChapter(){if(!currentChapterData)return;const ps=currentChapterData.paragraphs;const cs=await Promise.all(ps.map((_,i)=>getZh(currentChapterData.id,i)));const toT=ps.map((p,i)=>({i,en:p.en})).filter((_,i)=>!cs[i]);const B=currentEngine==='gemini'?10:20;for(let b=0;b<toT.length;b+=B){const batch=toT.slice(b,b+B);try{const rs=await callTrans(batch.map(x=>x.en));await Promise.all(rs.map(async(zh,ri)=>{const pi=batch[ri].i;await setZh(currentChapterData.id,pi,zh);const el=document.querySelector(`#sp_${pi} .sp-zh`);if(el)el.textContent=zh;}));}catch(e){console.error(e);break;}await new Promise(r=>setTimeout(r,300));}if(READ_MODE==='edge')await renderEdge();else await renderLegacy();if(READ_MODE==='legacy')await updateNP();updateTlStats();}
async function updateTlStats(){const el=document.getElementById('tlStats');if(!el)return;const c=db?await idbCount('translations'):'—';el.innerHTML=`已快取：${c} 段<br>儲存：IndexedDB`;}
async function clearTlCache(){if(!confirm('確定清除？'))return;if(db)await idbClear('translations');if(READ_MODE==='edge')await renderEdge();else await renderLegacy();updateTlStats();}

// Playback
function togglePlay(){if(READ_MODE==='edge')return;isPlaying=!isPlaying;updatePlayBtn();if(isPlaying)speakCurrent();else{SY.cancel();hideHL();}}
function updatePlayBtn(){const b=document.getElementById('playBtn');if(b)b.textContent=isPlaying?'⏸':'▶';}
function toggleAuto(){isAuto=!isAuto;document.getElementById('abtn').classList.toggle('on',isAuto);}
function updSpd(){rate=parseFloat(document.getElementById('spdRange').value);}
function setLang(m){if(READ_MODE==='edge')return;currentLangMode=m;['both','en','zh'].forEach(x=>document.getElementById(`mL_${x}`).classList.toggle('on',m===x));if(isPlaying)speakCurrent();}
function skip(v){if(READ_MODE==='edge'||!currentChapterData)return;const n=currentParaIndex+v;if(n>=0&&n<currentChapterData.paragraphs.length){selectPara(n);if(isPlaying)speakCurrent();}else if(n>=currentChapterData.paragraphs.length){if(isAuto&&currentChIdx<manifest.chapters.length-1)changeChapter(1);else{isPlaying=false;SY.cancel();hideHL();updatePlayBtn();}}}
function seekBar(e){if(!currentChapterData)return;const r=document.getElementById('prbar').getBoundingClientRect();selectPara(Math.max(0,Math.min(Math.floor(((e.clientX-r.left)/r.width)*currentChapterData.paragraphs.length),currentChapterData.paragraphs.length-1)));}

async function speakCurrent(){if(READ_MODE==='edge'||!isPlaying||!currentChapterData)return;const p=currentChapterData.paragraphs[currentParaIndex];if(!p)return;SY.cancel();const zh=(await getZh(currentChapterData.id,currentParaIndex))||p.zh||'';if(currentLangMode==='both'){speakBi(p.en,zh);}else{const text=currentLangMode==='en'?p.en:zh,voice=useMixVoice?mixV:(currentLangMode==='en'?enV:zhV);if(!text){skip(1);return;}const u=new SpeechSynthesisUtterance(text.replace(/[\[\]]/g,' '));u.voice=voice;u.rate=rate;u.lang=voice?voice.lang:(currentLangMode==='en'?'en-US':'zh-TW');u.onend=()=>{if(isPlaying&&isAuto)skip(1);};u.onboundary=ev=>{if(ev.name==='word')hlWord(currentParaIndex,ev.charIndex,ev.charLength,currentLangMode==='both'?'en':currentLangMode);};SY.speak(u);}}
function speakBi(enT,zhT){if(READ_MODE==='edge')return;const ce=enT.replace(/[\[\]]/g,' '),cz=zhT.replace(/[\[\]]/g,' '),isZF=DISPLAY_ORDER==='zh';if(useMixVoice){const u=new SpeechSynthesisUtterance(isZF?`${cz} ${ce}`:`${ce} ${cz}`);u.voice=mixV;u.rate=rate;u.lang=mixV?mixV.lang:(isZF?'zh-TW':'en-US');u.onend=()=>{if(isPlaying&&isAuto)skip(1);};SY.speak(u);return;}const f1T=isZF?cz:ce,f1V=isZF?zhV:enV,f1L=isZF?'zh-TW':'en-US',f1M=isZF?'zh':'en';const f2T=isZF?ce:cz,f2V=isZF?enV:zhV,f2L=isZF?'en-US':'zh-TW',f2M=isZF?'en':'zh';if(!f1T&&!f2T){if(isPlaying&&isAuto)skip(1);return;}function sp(t,v,l,m,last){if(!t){if(last&&isPlaying&&isAuto)skip(1);return;}const u=new SpeechSynthesisUtterance(t);u.voice=v;u.rate=rate;u.lang=v?v.lang:l;u.onend=()=>{if(!isPlaying)return;if(!last)sp(f2T,f2V,f2L,f2M,true);else if(isAuto)skip(1);};u.onboundary=ev=>{if(ev.name==='word')hlWord(currentParaIndex,ev.charIndex,ev.charLength,m);};SY.speak(u);}sp(f1T,f1V,f1L,f1M,false);}

// Voice
function pickV(){if(READ_MODE==='edge')return;allV=SY.getVoices();if(!allV.length)return;const en=allV.filter(v=>v.lang.startsWith('en')),zh=allV.filter(v=>v.lang.startsWith('zh'));const ENn=['andrew','samantha','karen','daniel','moira','tessa','aria','jenny'],ZHn=['yunjian','yunxi','eddy','mei-jia','tingting','xiaoxiao'];const sE=localStorage.getItem('selectedEnVoice'),sZ=localStorage.getItem('selectedZhVoice'),sM=localStorage.getItem('selectedMixVoice'),sU=localStorage.getItem('useMixVoice');useMixVoice=sU===null?true:sU==='true';if(sE)enV=allV.find(v=>v.name===sE);if(sZ)zhV=allV.find(v=>v.name===sZ);if(sM)mixV=allV.find(v=>v.name===sM);if(!enV){for(const n of ENn){const f=en.find(v=>v.name.toLowerCase().includes(n));if(f){enV=f;break;}}if(!enV)enV=en.find(v=>v.lang==='en-US')||en[0]||null;}if(!zhV){for(const n of ZHn){const f=zh.find(v=>v.name.toLowerCase().includes(n));if(f){zhV=f;break;}}if(!zhV)zhV=zh.find(v=>v.lang==='zh-TW')||zh.find(v=>v.lang==='zh-CN')||zh[0]||null;}if(!mixV){mixV=allV.find(v=>v.name.includes('AndrewMultilingual'))||zhV||enV;}}
function vq(v){const n=v.name.toLowerCase();if(['samantha','karen','daniel','moira','tessa','aria','jenny','mei-jia','tingting','xiaoxiao','yunxi'].some(k=>n.includes(k)))return'n';if(['neural','natural','enhanced'].some(k=>n.includes(k)))return'n';if(['victoria','tom','fred','premium'].some(k=>n.includes(k)))return'p';return's';}
function renderV(lang){if(READ_MODE==='edge')return;let vs;if(lang==='en')vs=allV.filter(v=>v.lang.startsWith('en-US')||v.lang.startsWith('en-GB'));else if(lang==='zh')vs=allV.filter(v=>v.lang.startsWith('zh'));else vs=allV.filter(v=>v.lang.startsWith('en')||v.lang.startsWith('zh'));const el=document.getElementById('vlist');if(!vs.length){el.innerHTML='<div class="no-voice">未找到語音</div>';return;}const s=[...vs].sort((a,b)=>['n','p','s'].indexOf(vq(a))-['n','p','s'].indexOf(vq(b)));el.innerHTML='';s.forEach(v=>{const q=vq(v),ql={n:'neural',p:'premium',s:'std'}[q];const sel=lang==='en'?(enV&&enV.name===v.name):lang==='zh'?(zhV&&zhV.name===v.name):(mixV&&mixV.name===v.name);const d=document.createElement('div');d.className='vi'+(sel?(lang==='en'?' es':lang==='zh'?' zs':' ms'):'');d.innerHTML=`<div class="vi-info"><div class="vi-n">${v.name}</div><div class="vi-l">${v.lang}</div></div><span class="vi-q ${q}">${ql}</span><button class="pvb">▶</button>`;d.querySelector('.pvb').onclick=ev=>{ev.stopPropagation();const u=new SpeechSynthesisUtterance(lang==='en'?'Hello, welcome.':'你好，歡迎使用。');u.voice=v;u.rate=rate;SY.cancel();SY.speak(u);};d.onclick=()=>{if(lang==='en'){enV=v;useMixVoice=false;localStorage.setItem('selectedEnVoice',v.name);}else if(lang==='zh'){zhV=v;useMixVoice=false;localStorage.setItem('selectedZhVoice',v.name);}else{mixV=v;useMixVoice=true;localStorage.setItem('selectedMixVoice',v.name);}localStorage.setItem('useMixVoice',useMixVoice);renderV(lang);};el.appendChild(d);});}
function swvt(lang){vtab=lang;document.getElementById('vte').className='vt'+(lang==='en'?' eon':'');document.getElementById('vtz').className='vt'+(lang==='zh'?' zon':'');document.getElementById('vtm').className='vt'+(lang==='mix'?' mon':'');renderV(lang);}

// Highlight
function hlWord(pi,ci,cl,lang){const el=document.querySelector(`#sp_${pi} .sp-${lang}`);if(!el)return;function getTN(p,off){const w=document.createTreeWalker(p,NodeFilter.SHOW_TEXT,null,false);let cur=w.nextNode(),co=0;while(cur){const l=cur.textContent.length;if(co+l>=off)return{node:cur,offset:off-co};co+=l;cur=w.nextNode();}return null;}const res=getTN(el,ci);if(!res)return;const{node,offset:ri}=res;let len=cl||1;try{const range=document.createRange();range.setStart(node,ri);range.setEnd(node,Math.min(ri+len,node.textContent.length));const rect=range.getBoundingClientRect();let h=document.getElementById('_hl');if(!h){h=document.createElement('div');h.id='_hl';h.style.cssText='position:fixed;background:rgba(200,169,110,0.35);border-radius:3px;pointer-events:none;transition:all 0.05s ease;display:none;z-index:100;';document.body.appendChild(h);}h.style.left=`${rect.left}px`;h.style.top=`${rect.top}px`;h.style.width=`${rect.width}px`;h.style.height=`${rect.height}px`;h.style.display='block';}catch{}}
function hideHL(){const h=document.getElementById('_hl');if(h)h.style.display='none';}
function showError(msg){document.getElementById('slist').innerHTML=`<div class="error-msg">${msg}</div>`;}
